experiment:
  name: "scale-10"
  rounds: 20
  num_clients: 10
  alpha: 0.5

server:
  port: 8000

# Scalability experiment: 10 clients at baseline network conditions.
# NOTE: RAM-intensive — monitor host memory. Each client container loads
# CIFAR-10 and a ResNet-18 instance. Expect ~1-2 GB RAM per client.
